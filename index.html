<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>给你的表白</title>
<style>
    body {
        font-family: sans-serif;
        background: #ffe6e6;
        text-align: center;
        padding: 50px 20px;
    }
    h1 { color: #ff4d88; font-size: 32px; }
    p { font-size: 18px; color: #444; line-height: 1.6; }
    button {
        margin-top: 30px;
        padding: 12px 28px;
        background: #ff4d88;
        border: none;
        color: white;
        font-size: 18px;
        border-radius: 8px;
        cursor: pointer;
    }
</style>
</head>

<body>
    <h1>我有一句话想对你说</h1>
    <p>遇见你之后，世界都变得温柔起来。</p>
    <button onclick="alert('我喜欢你！')">点我一下</button>
</body>
</html>
